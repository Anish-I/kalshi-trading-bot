name: weather-strategist
version: 0.2.0
model: claude-sonnet-4-6
system_prompt_path: weather-strategist.system.md
common_header_path: _common/system_prompt_header.md
strategist_header_path: _common/strategist_header.md
authority_class: advisory
snapshot_task: reporter
codex_review: required
success_criteria:
  - {metric: rolling_7d_win_rate, op: ">=", value: 0.40}
  - {metric: rolling_7d_ev_per_trade_cents, op: ">=", value: 20}
  - {metric: rolling_7d_max_drawdown_cents, op: "<=", value: 3000}
writable_config_keys:
  - {module: scripts/weather_trade.py, key: ENTRY_PRICE_MIN_CENTS, type: int, default: 0, bounds: [0, 100]}
  - {module: scripts/weather_trade.py, key: ENTRY_PRICE_MAX_CENTS, type: int, default: 100, bounds: [0, 100]}
tools:
  - type: agent_toolset_20260401
